# Filer — un seul service, exposé (pas de ports publiés) et rattaché au
# réseau Docker externe partagé du homelab pour Nginx Proxy Manager.

services:
  filer:
    build: .
    image: filer:latest
    container_name: filer
    restart: unless-stopped
    # Charge ADMIN_EMAILS, SESSION_SECRET, MAX_UPLOAD_MB, APP_URL (cf. .env.example).
    env_file: .env
    # `expose` (et non `ports`) : le port n'est visible que sur le réseau Docker,
    # Nginx Proxy Manager s'en charge pour l'exposition publique.
    expose:
      - "3000"
    volumes:
      # Volume nommé monté sur /data : fichiers uploadés + base SQLite.
      - filer_data:/data
    networks:
      - npm_net

volumes:
  filer_data:

networks:
  # Réseau externe que Nginx Proxy Manager possède DÉJÀ : Filer y est rattaché
  # dès le `up`, NPM le voit sans aucun `docker network connect` manuel (lequel
  # ne survit pas à une recréation du conteneur NPM — cf. l'incident SSL
  # gotyeah-stack). Ne JAMAIS laisser le projet créer un `filer_default` isolé.
  # Vérifier le nom du hub : `docker network ls` (npm_net probable, sinon
  # nginx-proxy-manager_default).
  npm_net:
    external: true
