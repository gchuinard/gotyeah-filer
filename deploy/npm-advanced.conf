# ─────────────────────────────────────────────────────────────────────────────
# Nginx Proxy Manager — config avancée du Proxy Host « filer.gautierchuinard.com »
#
# ⚠️  Ce fichier N'EST PAS lu automatiquement. C'est le snippet À COLLER dans NPM :
#       Proxy Hosts → (filer…) → Edit → onglet « Advanced »
#       → champ « Custom Nginx Configuration » → coller le bloc en bas → Save.
#     (Déjà appliqué en prod : il est aussi stocké en base, proxy_host.advanced_config
#      du host Filer. NPM régénère la conf de l'hôte à partir de cette valeur.)
#
# CONTEXTE — état réel de CE NPM (homelab Pi, mutualisé ~20 sites) :
#   - /etc/nginx/nginx.conf (contexte http)            : client_max_body_size 2000m  (défaut large)
#   - /data/nginx/custom/server_proxy.conf (chaque server{}) : client_max_body_size 25m
#       => cet include rabaisse TOUS les hosts à 25 Mo (cap voulu pour les pièces
#          jointes de chatpitre). C'est lui qui faisait le « 413 » sur Filer > 25 Mo,
#          PAS le défaut nginx 1m.
#
# POURQUOI un override scopé /api/upload (et pas global) :
#   - On ne touche pas au global : les autres sites (yoga, billetterie, monitor, chatpitre…
#     en prod) restent à 25 Mo.
#   - Un override per-host au niveau server entrerait en DOUBLON avec le 25m de
#     server_proxy.conf (même contexte) → nginx refuse. On descend donc au niveau
#     `location`, plus spécifique que le 25m server-level → il gagne, sans doublon.
#   - On ne relève la limite que sur l'endpoint d'upload (POST /api/upload), seul
#     chemin qui reçoit de gros corps. Le reste de Filer reste à 25 Mo (sans effet,
#     pas d'upload ailleurs).
#
# VALEURS :
#   - client_max_body_size 0   = pas de limite nginx → déléguée à l'app (MAX_UPLOAD_MB, 1024 Mo).
#   - proxy_request_buffering off = stream direct vers l'app (pas de buffer disque géant côté nginx).
#   - include proxy.conf       = reprend le proxy_pass/headers standards de NPM (mêmes $server/$port).
#
# RAPPEL Cloudflare (proxy orange, Full Strict) : plafond body 100 Mo (Free/Pro), quoi que
# dise nginx. Pour > 100 Mo : DNS-only (grey cloud) ou upload chunké.
# ─────────────────────────────────────────────────────────────────────────────

location /api/upload {
    client_max_body_size 0;
    proxy_request_buffering off;
    include conf.d/include/proxy.conf;
}
