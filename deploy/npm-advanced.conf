# ─────────────────────────────────────────────────────────────────────────────
# Nginx Proxy Manager — config avancée du Proxy Host « filer.gautierchuinard.com »
#
# ⚠️  Ce fichier N'EST PAS lu automatiquement. C'est un snippet À COLLER dans
#     l'interface de NPM :
#       Proxy Hosts → (filer…) → Edit → onglet « Advanced »
#       → champ « Custom Nginx Configuration » → coller le bloc ci-dessous → Save
#     (NPM recharge nginx tout seul après Save.)
#
# POURQUOI : sans `client_max_body_size`, nginx applique sa valeur compilée par
# défaut = 1 Mo, et renvoie « 413 Request Entity Too Large » AVANT que la requête
# n'atteigne le conteneur. Tout upload > 1 Mo échoue donc au niveau du proxy.
#
# Choix `client_max_body_size 0` (= illimité côté nginx) : la limite réelle est
# déjà appliquée par l'app via MAX_UPLOAD_MB (route /api/upload, qui streame et
# coupe le flux au-delà). Une seule source de vérité = la variable d'env.
#
# RAPPEL Cloudflare : si le sous-domaine est en proxy orange (Full Strict), CF
# plafonne le body à 100 Mo (Free/Pro), quoi que dise nginx. Pour > 100 Mo :
# passer le DNS en « DNS only » (grey cloud) ou prévoir un upload chunké.
# ─────────────────────────────────────────────────────────────────────────────

client_max_body_size 0;

# Recommandé pour les gros / lents uploads : streamer vers l'app sans tout
# bufferiser sur disque côté nginx, et laisser le temps aux transferts longs.
proxy_request_buffering off;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
